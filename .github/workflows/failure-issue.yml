name: CI Failure Tracker

on:
  workflow_run:
    workflows: ["CORE CI"]
    types: [completed]

permissions:
  issues: write

jobs:
  report:
    name: Report CI Failure
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const runName = context.payload.workflow_run.name;
            const runUrl = context.payload.workflow_run.html_url;
            const branch = context.payload.workflow_run.head_branch;
            const sha = context.payload.workflow_run.head_sha.substring(0, 7);

            await github.rest.issues.create({
              ...context.repo,
              title: `CI failed: ${runName} on ${branch} (${sha})`,
              body: [
                `## CI Failure Report`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| **Workflow** | ${runName} |`,
                `| **Branch** | \`${branch}\` |`,
                `| **Commit** | \`${sha}\` |`,
                `| **Run URL** | ${runUrl} |`,
                ``,
                `Please investigate and fix the failing checks.`
              ].join('\n'),
              labels: ['ci-failure', 'bug']
            });

            console.log(`Created failure issue for ${runName}`);
